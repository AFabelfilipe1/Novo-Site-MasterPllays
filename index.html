<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MasterPllays</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      /* Animações customizadas */
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes typing {
        from { width: 0 }
        to { width: 100% }
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      .animate-bounce { animation: bounce 2s infinite; }
      .animate-typing { animation: typing 3.5s steps(40, end); }
      .animate-blink { animation: blink 1s infinite; }
      
      /* Estilo inicial */
      #root {
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }
      
      #root.loaded {
        opacity: 1;
      }
      
      /* Loading inicial */
      #initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .initial-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading inicial (some quando React carrega) -->
    <div id="initial-loading" class="initial-loading">
      <div class="text-center">
        <div class="w-32 h-32 mx-auto mb-8 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center animate-pulse">
          <span class="text-6xl">🎮</span>
        </div>
        <h1 class="text-5xl font-bold text-white mb-4">MasterPllays</h1>
        <p class="text-white/80">Prepare-se para a diversão...</p>
        <div class="w-48 h-1 bg-white/30 rounded-full overflow-hidden mx-auto mt-8">
          <div class="h-full bg-white animate-[loading_2s_ease-in-out_infinite]"></div>
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Remove o loading quando React carregar
      window.addEventListener('load', function() {
        setTimeout(() => {
          const loading = document.getElementById('initial-loading');
          const root = document.getElementById('root');
          
          if (loading) {
            loading.classList.add('hidden');
          }
          
          if (root) {
            root.classList.add('loaded');
          }
        }, 1500); // Tempo mínimo de loading
      });
    </script>
  </body>
</html>
